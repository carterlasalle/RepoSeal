name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - name: Strict rustdoc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps
      - run: python3 scripts/check_repo.py

  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn check
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --project packages/python-sdk --locked
      - run: uv run --project packages/python-sdk python -m unittest discover -s packages/python-sdk/tests
      - run: python3 -m py_compile integrations/claude-code/reposeal_hook.py
      - run: bash -n packages/github-action/run.sh

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check advisories bans licenses sources

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97.0
      - run: cargo run --locked -p reposeal -- benchmark --agent github-actions --json | tee benchmark.json
      - run: python3 -c 'import json; r=json.load(open("benchmark.json")); assert r["grade"] == "A" and r["hallusquats_blocked"] == 100'

  release-smoke:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --locked --release -p reposeal --target ${{ matrix.target }}
      - shell: bash
        run: |
          binary=target/${{ matrix.target }}/release/reposeal
          test -s "$binary"
          shasum -a 256 "$binary" > "$binary.sha256"
          test -s "$binary.sha256"
